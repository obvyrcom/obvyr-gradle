name: Gradle Plugin — Test & Release

on:
  push:
    branches: [main]
    paths:
      - "plugins/obvyr_gradle/**"
    tags:
      - "gradle/v*"
  pull_request:
    branches: [main]
    paths:
      - "plugins/obvyr_gradle/**"

jobs:
  gradle-ci:
    name: Gradle Plugin CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build obvyr-cli Docker image
        run: docker build -t local/obvyr-cli:development --target development obvyr_cli/

      - name: Start obvyr-cli container
        run: docker compose up -d cli

      - name: Build
        run: ./gradlew build
        working-directory: ./plugins/obvyr_gradle

      - name: Test
        run: ./gradlew test --rerun-tasks
        working-directory: ./plugins/obvyr_gradle

      - name: Stop containers
        if: always()
        run: docker compose down

  gradle-publish:
    name: Gradle Plugin Publish
    runs-on: ubuntu-latest
    needs: gradle-ci
    if: startsWith(github.ref, 'refs/tags/gradle/v')

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/gradle/v}" >> "$GITHUB_OUTPUT"

      - name: Publish to Gradle Plugin Portal
        run: >-
          ./gradlew publishPlugins
          -PpluginVersion=${{ steps.version.outputs.version }}
          -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }}
          -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }}
        working-directory: ./plugins/obvyr_gradle
